<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Pengajuan Pengembalian Dana</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }

        h1 { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 10pxtrri; color: #31353B; }
        p { text-align: center; color: #6D7588; font-size: 14px; margin-bottom: 30px; line-height: 1.4; }
        .btn-option { width: 100%; max-width: 400px; padding: 16px; background-color: #03AC0E; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; margin-bottom: 12px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .footer { margin-top: auto; color: #9FA6B0; font-size: 12px; padding: 20px; }
    </style>
</head>
<body>
    <div class="logo"><span style="color:white; font-size: 40px;">🛒</span></div>

        function simpanMetode(pilihan) {
            localStorage.setItem('metode_pilihan', pilihan);
        }
    </script>
